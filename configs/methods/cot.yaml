method:
  name: "CoT"
  type: "inference"
  description: "Chain-of-Thought prompting baseline - no training, pure inference"

system_prompt: |
  Respond in the following format:
  <reasoning>
  ...
  </reasoning>
  <answer>
  ...
  </answer>

generation:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false

evaluation:
  test_samples: 1319
  metrics:
    - accuracy
    - format_compliance
