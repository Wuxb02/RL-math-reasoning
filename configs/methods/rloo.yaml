method:
  name: "RLOO"
  type: "training"
  description: "Reinforce Leave-One-Out (RLOO) — replaces PPO for TRL 1.0.0+"

training:
  learning_rate: 5.0e-6
  adam_beta1: 0.9
  adam_beta2: 0.99
  weight_decay: 0.1
  warmup_steps: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 1
  
  # RLOO specific
  num_generations: 4          # G completions per prompt (RLOO advantage baseline)
  per_device_train_batch_size: 4
  rloo_iterations: 1          # Number of gradient steps per batch (like ppo_epochs)
  
  # KL penalty
  beta: 0.05                  # KL penalty coefficient (RLOO uses beta, not kl_coef)
  
  # Training
  num_train_epochs: 1
  bf16: true
  max_grad_norm: 0.1
  gradient_accumulation_steps: 1
  
  # Generation
  max_completion_length: 1024  # Replaces max_new_tokens
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  
  # Saving
  save_steps: 200
  output_dir: "outputs"

# vLLM acceleration (server mode: GPU1 for inference)
use_vllm: true
vllm_mode: "server"
vllm_gpu_memory_utilization: 0.9
vllm_server_host: "localhost"
vllm_server_port: 8000

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

reward:
  xml_count_weight: 0.5
  soft_format_weight: 0.5
  strict_format_weight: 0.5
  integer_weight: 0.5
  reasoning_quality_weight: 0.3
  correctness_weight: 2.0
