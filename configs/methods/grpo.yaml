method:
  name: "GRPO"
  type: "training"
  description: "Group Relative Policy Optimization"

training:
  learning_rate: 5.0e-6
  adam_beta1: 0.9
  adam_beta2: 0.99
  weight_decay: 0.1
  warmup_steps: 50
  lr_scheduler_type: "cosine"
  logging_steps: 1
  bf16: true
  
  # GRPO specific
  num_generations: 4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1

  # KL penalty
  beta: 0.05
   
  # Generation
  max_completion_length: 1024

  # Training
  num_train_epochs: 1
  max_grad_norm: 0.1

  # Saving
  save_steps: 200
  output_dir: "outputs"

  # vLLM acceleration (server mode: GPU1 for inference)
  use_vllm: true
  vllm_mode: "server"
  vllm_gpu_memory_utilization: 0.9
  vllm_server_host: "localhost"
  vllm_server_port: 8000

lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

reward:
  xml_count_weight: 0.25
  soft_format_weight: 0.25
  strict_format_weight: 0.25
  integer_weight: 0.1
  reasoning_quality_weight: 0.2
  correctness_weight: 2.0
